<section class="product-detail" aria-labelledby="product-detail-title">
  <div class="product-detail__gallery">
    <div class="product-detail__image"></div>
    <div class="product-detail__thumbs">
      <div class="product-detail__thumb"></div>
      <div class="product-detail__thumb"></div>
      <div class="product-detail__thumb"></div>
    </div>
  </div>

  <article class="product-detail__info">
    <p class="product-detail__sku">Producto #{{ productId }}</p>
    <h1 id="product-detail-title" class="product-detail__title">Alpargatas Air Sprint 01</h1>
    <p class="product-detail__category">Zapatillas de atletismo - Hombre</p>
    <p class="product-detail__price">129,99 EUR</p>
    <p class="product-detail__description">
      Espuma reactiva, suela adherente y ajuste seguro para entrenamiento diario y competicion.
    </p>
    <div class="product-detail__actions">
      <a class="button button--primary" routerLink="/carrito">Anadir al carrito</a>
      <a class="button button--secondary" routerLink="/productos">Volver al listado</a>
    </div>
  </article>
</section>
